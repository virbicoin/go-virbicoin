# This is an example .goreleaser.yml file with some sensible defaults.
# Make sure to check the documentation at https://goreleaser.com

# The lines below are called `modelines`. See `:help modeline`
# Feel free to remove those if you don't want/need to use them.
# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    # You may remove this if you don't use go modules.
    - go mod tidy

builds:
  - id: linux
    binary: go-virbicoin
    main: ./cmd/gvbc
    goos:
      - linux
    goarch:
      - amd64
      - 386
      - arm64
  - id: darwin
    binary: go-virbicoin
    main: ./cmd/gvbc
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
  - id: windows
    binary: go-virbicoin
    main: ./cmd/gvbc
    goos:
      - windows
    goarch:
      - amd64
      - 386
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true
    files:
      - COPYING
      - README.md
      - README-JP.md
      - go.mod
      - go.sum
    format_overrides:
      - goos: windows
        formats: [zip]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "Merge pull request"
      - "Merge branch"

release:
  draft: true
  header: |
    ## VirBiCoin {{ .Tag }}

    VirBiCoin プロトコルの公式 Go 実装 `gvbc` のリリースです。

    ### 対応プラットフォーム

    - **Linux**: amd64 / arm64 / 386
    - **macOS**: amd64 / arm64
    - **Windows**: amd64 / arm64 / 386

    ### インストール

    お使いのプラットフォームのアーカイブをダウンロードして展開し、`gvbc`
    バイナリをパスの通ったディレクトリに配置してください。

    ```shell
    # 例: Linux amd64
    wget https://github.com/virbicoin/go-virbicoin/releases/download/{{ .Tag }}/go-virbicoin_{{ trimprefix .Tag "v" }}_linux_amd64.tar.gz
    tar zxvf go-virbicoin_{{ trimprefix .Tag "v" }}_linux_amd64.tar.gz
    ```
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
